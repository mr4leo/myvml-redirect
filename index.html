<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continue to my.vml.com</title>

  <!-- ============================================================

  <link rel="canonical" href="https://my.vml.com/">

  <!-- ============================================================
       STYLES
       ============================================================ -->
  <style>
    :root {
      --accent-color: #D9784E;
      --accent-color-hover: #c76a41;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }

    /* --- CTA Button --- */
    .cta-button {
      display: inline-block;
      padding: 16px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      background-color: var(--accent-color);
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 12px 24px -6px rgba(217, 120, 78, 0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }

    .cta-button:hover {
      background-color: var(--accent-color-hover);
      box-shadow: 0 16px 28px -6px rgba(217, 120, 78, 0.7);
      transform: translateY(-2px);
    }

    .cta-button:active {
      transform: translateY(0);
      box-shadow: 0 8px 16px -6px rgba(217, 120, 78, 0.6);
    }
  </style>
</head>
<body>
