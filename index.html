<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Continue</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    height: 100vh;
    width: 100vw;
    font-family: Arial, Helvetica, sans-serif;
    display: grid;
    place-items: center;
    background-color: #f5f5f5;
  }

  .continue-btn {
    display: inline-block;
    padding: 0.9rem 2rem;
    font-weight: bold;
    font-size: 1rem;
    color: #ffffff;
    background-color: #D9784E;
    border-radius: 2rem;
    text-decoration: none;
    filter: drop-shadow(0 1.25rem 1.5rem rgba(217, 120, 78, 0.45));
    transition: all 0.2s ease;
  }

  .continue-btn:hover {
    background-color: #c7683f;
    transform: translateY(-2px);
  }
</style>
</head>
<body>

  <a href="https://my.vml.com/" class="continue-btn">Continue to my.vml.com</a>

</body>
</html>
